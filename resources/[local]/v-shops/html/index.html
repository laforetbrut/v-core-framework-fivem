<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="https://cfx-nui-v-ui/theme.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="v-root">
  <div id="shop" class="shop-overlay hidden">
    <div class="shop-wrap">

      <!-- CATALOGUE -->
      <div class="shop v-chamfer v-panel">
        <i class="v-brk v-brk--tr" aria-hidden="true"></i>
        <i class="v-brk v-brk--bl" aria-hidden="true"></i>
        <span class="v-tab" id="shop-label">Shop</span>
        <button class="close" id="close" aria-label="Close">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M6 6l12 12M18 6 6 18"/></svg>
        </button>
        <div class="head">
          <div class="wallet">
            <button class="pay sel" id="pay-cash" data-acc="cash" aria-label="Pay with cash">
              <span class="v-label" data-i18n="shop.cash">Cash</span><span class="amt" id="w-cash">$0</span>
            </button>
            <button class="pay" id="pay-bank" data-acc="bank" aria-label="Pay with bank">
              <span class="v-label" data-i18n="shop.bank">Bank</span><span class="amt" id="w-bank">$0</span>
            </button>
          </div>
        </div>
        <div class="list v-scroll" id="list"></div>
      </div>

      <!-- YOUR INVENTORY (drop a shop item here to buy it) -->
      <div class="invview v-chamfer v-panel">
        <i class="v-brk v-brk--tr" aria-hidden="true"></i>
        <i class="v-brk v-brk--bl" aria-hidden="true"></i>
        <span class="v-tab" data-i18n="shop.inventory">Inventory</span>
        <div class="inv-hint" data-i18n="shop.drag_hint">Drag an item here to buy it</div>
        <div class="inv-grid v-scroll" id="inv-grid"></div>
      </div>

    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
