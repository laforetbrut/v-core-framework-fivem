<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <!-- The phone's own stylesheet and kit. Nothing is copied: an app that linked its own
       CSS would stop looking native the first time the phone was restyled. -->
  <link rel="stylesheet" href="https://cfx-nui-v-ui/theme.css" />
  <link rel="stylesheet" href="https://cfx-nui-v-ui/theme-vars.css" />
  <link rel="stylesheet" href="https://cfx-nui-v-phone/style.css" />
  <script src="https://cfx-nui-v-phone/sdk.js"></script>
  <style>
    /* Inside a frame the app IS the body, so it gets the app padding itself. */
    html, body { height: 100%; background: transparent; }
    body { padding: 54px 16px 30px; overflow-y: auto; font-family: var(--ios-font); color: #fff; }
    body::-webkit-scrollbar { width: 0; }
  </style>
</head>
<body>
  <div id="appbody"></div>

  <script>
  // ── Notes — a complete phone app ─────────────────────────────
  // Everything below is the app. There is no build step and no framework: the kit
  // returns HTML strings, and Phone.storage is persisted per character by v-phone.
  let notes = [];
  let editing = null;

  const UI = PhoneUI;

  function list() {
    Phone.title('Notes');
    UI.render(
      UI.button('New note', 'new') +
      (notes.length
        ? UI.group(notes.map((n, i) => UI.row({
            icon: 'note',
            title: n.title || '(untitled)',
            subtitle: n.body ? n.body.slice(0, 60) : '',
            chevron: true,
            data: { i },
          })), { header: 'Saved', footer: 'Notes are kept on your character, not on this device.' })
        : UI.empty('Nothing written down yet', 'note'))
    );
    document.getElementById('new').onclick = () => edit(null);
  }

  function edit(index) {
    editing = index;
    const n = index === null ? { title: '', body: '' } : notes[index];
    Phone.title(index === null ? 'New note' : 'Edit');
    UI.render(
      UI.field('t', 'Title', n.title, 'maxlength="40"') +
      UI.field('b', 'Write something', n.body, 'maxlength="500"') +
      UI.button('Save', 'save') +
      UI.button('Back', 'back', 'plain') +
      (index === null ? '' : UI.button('Delete', 'del', 'destructive'))
    );
    document.getElementById('save').onclick = save;
    document.getElementById('back').onclick = list;
    const d = document.getElementById('del');
    if (d) d.onclick = remove;
  }

  async function save() {
    const note = {
      title: document.getElementById('t').value.trim(),
      body: document.getElementById('b').value.trim(),
    };
    if (!note.title && !note.body) { Phone.toast('Nothing to save'); return; }
    if (editing === null) notes.unshift(note); else notes[editing] = note;
    await persist();
    Phone.toast('Saved');
    list();
  }

  async function remove() {
    notes.splice(editing, 1);
    await persist();
    list();
  }

  // One write, one key. v-phone stores it against this character and this app id.
  function persist() {
    Phone.badge(notes.length);
    return Phone.storage.set('notes', JSON.stringify(notes));
  }

  Phone.ready(async function () {
    const res = await Phone.storage.get('notes');
    try { notes = JSON.parse((res && res.value) || '[]') || []; } catch (e) { notes = []; }
    Phone.badge(notes.length);
    UI.on('.row[data-i]', 'click', (e, el) => edit(Number(el.dataset.i)));
    list();
  });
  </script>
</body>
</html>
