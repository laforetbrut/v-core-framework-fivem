<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="https://cfx-nui-v-ui/theme.css" />
  <link rel="stylesheet" href="https://cfx-nui-v-ui/theme-vars.css" />
  <script src="https://cfx-nui-v-ui/theme.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="v-root">
  <!-- Mouse-orbit capture surface (behind the panel; drag to rotate, wheel to zoom) -->
  <div id="stage" class="stage hidden"></div>

  <!-- Character selection -->
  <div id="screen-select" class="select-overlay hidden">
    <div class="select-inner">
      <div class="lang-brand"><span class="dot" aria-hidden="true"></span> PROJET R</div>
      <h1 class="spawn-title" data-i18n="sel.title">Your characters</h1>
      <div class="char-grid" id="charcards"></div>
    </div>
  </div>

  <!-- Language selection -->
  <div id="screen-language" class="lang-overlay hidden">
    <div class="lang-card">
      <i class="v-brk v-brk--tr" aria-hidden="true"></i><i class="v-brk v-brk--bl" aria-hidden="true"></i>
      <div class="lang-brand"><span class="dot" aria-hidden="true"></span> PROJET R</div>
      <h1 class="lang-title">Choisis ta langue<span>Select your language</span></h1>
      <div class="lang-btns">
        <button class="lang-btn" data-lang="fr"><span class="flag">FR</span><span>Français</span></button>
        <button class="lang-btn" data-lang="en"><span class="flag">EN</span><span>English</span></button>
      </div>
    </div>
  </div>

  <!-- Right dock -->
  <div id="panel" class="panel hidden">
    <i class="v-brk v-brk--tr" aria-hidden="true"></i><i class="v-brk v-brk--bl" aria-hidden="true"></i>
    <div class="panel__head">
      <span class="head-tab">PROJET <b>R</b></span>
      <span class="dot" aria-hidden="true"></span>
      <h1 class="v-title" id="panel-title" data-i18n="id.title">Create your character</h1>
    </div>

    <!-- Identity -->
    <div id="screen-identity" class="screen">
      <div class="field"><label class="v-label" data-i18n="id.firstname">First name</label><input id="firstname" maxlength="24" autocomplete="off" aria-label="First name" /></div>
      <div class="field"><label class="v-label" data-i18n="id.lastname">Last name</label><input id="lastname" maxlength="24" autocomplete="off" aria-label="Last name" /></div>
      <div class="field"><label class="v-label" data-i18n="id.dob">Date of birth</label><input id="dob" type="date" value="2000-01-01" aria-label="Date of birth" /></div>
      <div class="field"><label class="v-label" data-i18n="id.sex">Sex</label>
        <div class="seg">
          <button class="seg-btn on" data-sex="0" data-i18n="id.male">Male</button>
          <button class="seg-btn" data-sex="1" data-i18n="id.female">Female</button>
        </div>
      </div>
      <div class="err" id="id-err"></div>
      <button class="v-btn v-btn--accent full" id="btn-next" data-i18n="id.next">Next</button>
    </div>

    <!-- Appearance -->
    <div id="screen-appearance" class="screen hidden">
      <div class="tabs" id="tabs"></div>
      <div class="controls v-scroll" id="controls"></div>
      <div class="foot">
        <button class="v-btn v-btn--ghost" id="btn-back" data-i18n="app.back">Back</button>
        <button class="v-btn v-btn--accent" id="btn-confirm" data-i18n="app.confirm">Confirm &amp; Spawn</button>
      </div>
    </div>
  </div>

  <!-- Spawn location selection (after creation) -->
  <div id="screen-spawn" class="spawn-overlay hidden">
    <div class="spawn-inner">
      <div class="lang-brand"><span class="dot" aria-hidden="true"></span> PROJET R</div>
      <h1 class="spawn-title" data-i18n="spawn.title">Where does your story begin?</h1>
      <div class="spawn-cards" id="spawncards"></div>
    </div>
  </div>

  <!-- Camera controls -->
  <div id="cam" class="cam hidden">
    <div class="cam-zones">
      <button class="cam-zone on" data-zone="body" data-i18n="cam.body">Body</button>
      <button class="cam-zone" data-zone="head" data-i18n="cam.head">Head</button>
      <button class="cam-zone" data-zone="legs" data-i18n="cam.legs">Legs</button>
    </div>
    <span class="cam-hint" data-i18n="cam.hint">Drag to rotate · scroll to zoom</span>
  </div>

  <script src="app.js"></script>
</body>
</html>
