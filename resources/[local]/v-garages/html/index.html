<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="https://cfx-nui-v-ui/theme.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="v-root">
  <div id="gar" class="gar-overlay hidden">
    <!-- the stage is the transparent area the showroom camera renders through:
         dragging it orbits the car, the wheel zooms -->
    <div class="stage" id="stage"></div>
    <div class="gar v-chamfer v-panel">
      <i class="v-brk v-brk--tr" aria-hidden="true"></i>
      <i class="v-brk v-brk--bl" aria-hidden="true"></i>
      <span class="v-tab" id="gtitle">Garage</span>
      <button class="close" id="close" aria-label="Close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M6 6l12 12M18 6 6 18"/></svg>
      </button>
      <div class="sub" data-i18n="gar.sub">Your vehicles parked here</div>
      <div class="feerow hidden" id="feerow"></div>
      <div class="list v-scroll" id="list"></div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
