<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="https://cfx-nui-v-ui/theme.css" />
  <link rel="stylesheet" href="https://cfx-nui-v-ui/theme-vars.css" />
  <script src="https://cfx-nui-v-ui/theme.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="v-root">
  <div id="rent" class="rent-overlay hidden">
    <div class="panel v-panel v-chamfer">
      <div class="panel__head">
        <div>
          <div class="ttl" id="r-title">Vehicle Rental</div>
          <div class="sub" id="r-sub"></div>
        </div>
        <div class="head-right">
          <span class="chip" id="r-dur"></span>
          <button class="x" id="r-close" aria-label="Close">&times;</button>
        </div>
      </div>

      <div class="banner hidden" id="r-active"></div>

      <div class="panel__body v-scroll">
        <div class="grid" id="r-grid"></div>
        <div class="empty hidden" id="r-empty"></div>
      </div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
