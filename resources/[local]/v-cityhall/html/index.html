<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="https://cfx-nui-v-ui/theme.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="v-root">
  <div id="hall" class="hall-overlay hidden">
    <div class="hall v-chamfer v-panel">
      <i class="v-brk v-brk--tr" aria-hidden="true"></i>
      <i class="v-brk v-brk--bl" aria-hidden="true"></i>
      <span class="v-tab" data-i18n="cityhall.title">City Hall</span>
      <button class="close" id="close" aria-label="Close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M6 6l12 12M18 6 6 18"/></svg>
      </button>
      <div class="sub" data-i18n="cityhall.sub">Open positions · hired at entry grade</div>

      <div class="cur">
        <span class="curlbl" data-i18n="cityhall.current">Current job</span>
        <span class="curval" id="cur-job">—</span>
        <button class="mini danger" id="resign" data-i18n="cityhall.resign">Resign</button>
      </div>

      <div class="list v-scroll" id="list"></div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
