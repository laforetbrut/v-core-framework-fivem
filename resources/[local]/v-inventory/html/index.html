<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="https://cfx-nui-v-ui/theme.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="v-root" class="hidden">
    <div class="inv-wrap">
      <!-- QUICK SLOTS (left) -->
      <aside class="quickbar">
        <span class="quick-label" data-i18n="inv.quick">Quick slots</span>
        <div class="quick-grid" id="quickbar" data-inv="player"></div>
      </aside>

      <!-- PLAYER -->
      <section class="panel" id="panel-player">
        <header class="panel-head">
          <div class="ptitle"><span class="v-title" id="player-label" data-i18n="inv.player">Inventory</span>
            <span class="wallet-chip" id="wallet" draggable="true"><span class="wc-ic">$</span><span id="wallet-amt">$0</span></span>
          </div>
          <div class="wmeter">
            <span class="wtxt" id="player-wtxt">0.00 / 30.00</span>
            <div class="segbar" id="player-seg"></div>
          </div>
          <input class="search" id="player-search" data-i18n-ph="inv.search" autocomplete="off" />
        </header>
        <div class="grid v-scroll" id="grid-player" data-inv="player"></div>
      </section>

      <!-- SECONDARY -->
      <section class="panel hidden" id="panel-secondary">
        <header class="panel-head">
          <div class="ptitle"><span class="v-title" id="sec-label">Stash</span></div>
          <div class="wmeter">
            <span class="wtxt" id="sec-wtxt">0.00 / 0.00</span>
            <div class="segbar" id="sec-seg"></div>
          </div>
          <input class="search" id="sec-search" data-i18n-ph="inv.search" autocomplete="off" />
        </header>
        <div class="grid v-scroll" id="grid-secondary" data-inv="secondary"></div>
      </section>
    </div>
    <div class="hint" data-i18n="inv.hint">Drag to move · Right-click for actions · Esc to close</div>
  </div>

  <!-- shared singletons -->
  <div id="tooltip" class="tooltip hidden"></div>
  <ul id="context" class="context hidden"></ul>

  <!-- amount picker -->
  <div id="amount" class="amount-overlay hidden">
    <div class="amount-box">
      <span class="v-label" id="amount-title">Amount</span>
      <input type="number" id="amount-input" min="1" value="1" autocomplete="off" />
      <input type="range" id="amount-range" min="1" max="1" value="1" />
      <div class="amount-btns">
        <button class="v-btn v-btn--ghost" id="amount-cancel" data-i18n="inv.cancel">Cancel</button>
        <button class="v-btn v-btn--accent" id="amount-ok" data-i18n="inv.confirm">Confirm</button>
      </div>
    </div>
  </div>

  <!-- rename -->
  <div id="rename" class="amount-overlay hidden">
    <div class="amount-box">
      <span class="v-label" data-i18n="inv.rename">Rename</span>
      <input type="text" id="rename-input" maxlength="30" autocomplete="off" />
      <div class="amount-btns">
        <button class="v-btn v-btn--ghost" id="rename-cancel" data-i18n="inv.cancel">Cancel</button>
        <button class="v-btn v-btn--accent" id="rename-ok" data-i18n="inv.confirm">Confirm</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
