<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="https://cfx-nui-v-ui/theme.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="v-root">
  <!-- Minimap frame (our own; wraps the repositionable native radar) -->
  <div id="minimap" class="minimap-frame" data-group="minimap">
    <span class="mm-corner tl"></span><span class="mm-corner tr"></span>
    <span class="mm-corner bl"></span><span class="mm-corner br"></span>
    <span class="mm-grip"><span class="dot"></span><span data-i18n="el.minimap">Minimap</span></span>
    <span id="mm-resize" class="mm-resize" title="Resize"></span>
  </div>

  <!-- Compass (top-center by default) -->
  <div id="compass" class="compass hidden" data-group="compass">
    <div class="compass-arrow"></div>
    <div class="compass-window"><div class="compass-tape" id="compass-tape"></div></div>
    <span class="compass-deg" id="compass-deg">0°</span>
  </div>

  <!-- Vitals (bottom-left, near the minimap) -->
  <div id="vitals" class="vitals" data-group="vitals"></div>

  <!-- Money (bottom-right) -->
  <div id="money" class="money hidden" data-group="money">
    <div class="stat" id="stat-cash">
      <span class="ic" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 7.5A2.5 2.5 0 0 1 5.5 5H17a2 2 0 0 1 2 2v1" />
          <path d="M3 7.5V17a2 2 0 0 0 2 2h13a1 1 0 0 0 1-1v-3" />
          <path d="M20 11h-4a2 2 0 0 0 0 4h4a1 1 0 0 0 1-1v-2a1 1 0 0 0-1-1Z" />
        </svg>
      </span>
      <div class="meta"><span class="lbl" data-i18n="hud.cash">Cash</span><span class="val" id="cash">$0</span></div>
    </div>
    <div class="stat" id="stat-bank">
      <span class="ic" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9.5 12 4l9 5.5" /><path d="M5 10v7M9 10v7M15 10v7M19 10v7" /><path d="M3 20h18" />
        </svg>
      </span>
      <div class="meta"><span class="lbl" data-i18n="hud.bank">Bank</span><span class="val" id="bank">$0</span></div>
    </div>
  </div>

  <!-- Layout (drag) mode toolbar -->
  <div id="layout-bar" class="layout-bar hidden">
    <span class="dot"></span>
    <span data-i18n="set.drag_hint">Drag the elements to reposition them</span>
    <button class="v-btn v-btn--accent" id="btn-layout-done" data-i18n="set.done">Done</button>
  </div>

  <!-- Settings panel -->
  <div id="settings" class="overlay hidden">
    <div class="panel v-panel">
      <div class="panel__head">
        <div class="brand">
          <span class="dot"></span>
          <h1 class="v-title">HUD <span class="v-title__accent" data-i18n="set.title">Settings</span></h1>
        </div>
        <button class="close" id="btn-close" aria-label="Close">&times;</button>
      </div>

      <div class="panel__body v-scroll">
        <div class="group">
          <span class="v-label" data-i18n="set.elements">Elements</span>
          <div class="toggles" id="toggles"></div>
        </div>

        <div class="group">
          <span class="v-label" data-i18n="set.layout">Layout</span>
          <button class="v-btn v-btn--ghost full" id="btn-move" data-i18n="set.move">Move elements</button>
        </div>

        <div class="group">
          <span class="v-label" data-i18n="set.accent">Accent</span>
          <div class="swatches" id="swatches"></div>
          <label class="custom-color">
            <input type="color" id="accent-custom" value="#FF6A1A" />
            <span data-i18n="set.custom">Custom colour</span>
          </label>
        </div>

        <div class="group">
          <span class="v-label"><span data-i18n="set.opacity">Opacity</span> <em id="opacity-val">100%</em></span>
          <input type="range" id="opacity" min="30" max="100" value="100" />
        </div>

        <div class="group">
          <span class="v-label"><span data-i18n="set.scale">Scale</span> <em id="scale-val">100%</em></span>
          <input type="range" id="scale" min="70" max="130" value="100" />
        </div>

        <div class="group row-between">
          <span class="v-label" style="margin:0" data-i18n="set.dynamic">Hide vitals when full</span>
          <button class="switch" id="dynamic" role="switch"><span></span></button>
        </div>

        <div class="group">
          <span class="v-label"><span data-i18n="set.mapsize">Minimap size</span> <em id="mmsize-val">100%</em></span>
          <input type="range" id="mmsize" min="60" max="200" value="100" />
        </div>

        <div class="group row-between">
          <span class="v-label" style="margin:0" data-i18n="set.mapvehicle">Minimap only in vehicle</span>
          <button class="switch" id="mapvehicle" role="switch"><span></span></button>
        </div>
      </div>

      <div class="panel__foot">
        <button class="v-btn v-btn--ghost" id="btn-reset" data-i18n="set.reset">Reset</button>
        <button class="v-btn v-btn--accent" id="btn-save" data-i18n="set.save">Save</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
