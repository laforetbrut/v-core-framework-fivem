<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="https://cfx-nui-v-ui/theme.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="v-root">
  <div id="hud" class="hud hidden">
    <div class="stat" id="stat-cash">
      <span class="ic" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 7.5A2.5 2.5 0 0 1 5.5 5H17a2 2 0 0 1 2 2v1" />
          <path d="M3 7.5V17a2 2 0 0 0 2 2h13a1 1 0 0 0 1-1v-3" />
          <path d="M20 11h-4a2 2 0 0 0 0 4h4a1 1 0 0 0 1-1v-2a1 1 0 0 0-1-1Z" />
        </svg>
      </span>
      <div class="meta">
        <span class="lbl">Cash</span>
        <span class="val" id="cash">$0</span>
      </div>
    </div>

    <div class="stat" id="stat-bank">
      <span class="ic" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9.5 12 4l9 5.5" />
          <path d="M5 10v7M9 10v7M15 10v7M19 10v7" />
          <path d="M3 20h18" />
        </svg>
      </span>
      <div class="meta">
        <span class="lbl">Bank</span>
        <span class="val" id="bank">$0</span>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
