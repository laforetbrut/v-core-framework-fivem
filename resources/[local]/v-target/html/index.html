<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="https://cfx-nui-v-ui/theme.css" />
  <link rel="stylesheet" href="https://cfx-nui-v-ui/theme-vars.css" />
  <script src="https://cfx-nui-v-ui/theme.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="eye" class="eye hidden">
    <!-- The reticle is pinned to the screen centre because that is exactly where the
         world ray is cast from. It is the aim point, not a cursor. -->
    <div class="reticle" id="reticle">
      <span class="ring"></span>
      <span class="dot"></span>
      <span class="tick t"></span><span class="tick r"></span>
      <span class="tick b"></span><span class="tick l"></span>
    </div>

    <div class="panel hidden" id="panel">
      <div class="head" id="head">
        <button class="back hidden" id="back" type="button" aria-label="back">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round"><path d="M15 5l-7 7 7 7"/></svg>
        </button>
        <span class="ttl" id="ttl"></span>
      </div>
      <div class="rows" id="rows"></div>
      <div class="foot" id="foot"></div>
    </div>

    <div class="cursor" id="cursor"></div>
  </div>
  <script src="app.js"></script>
</body>
</html>
