<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <video class="bg-video" autoplay muted loop playsinline poster="poster.jpg" aria-hidden="true">
    <source src="bg.mp4" type="video/mp4" />
  </video>
  <div class="bg-image" aria-hidden="true"></div>
  <div class="bg-overlay" aria-hidden="true"></div>
  <div class="grain" aria-hidden="true"></div>
  <div class="vignette" aria-hidden="true"></div>
  <div class="scan" aria-hidden="true"></div>

  <main class="stage">
    <header class="brand" style="--i:0">
      <div class="kicker" id="ls-kicker">Los Santos Roleplay</div>
      <h1 class="mark"><span id="ls-title">PROJET</span> <span id="ls-title-accent">R</span></h1>
    </header>

    <section class="loader" style="--i:1">
      <i class="brk brk-tr" aria-hidden="true"></i><i class="brk brk-bl" aria-hidden="true"></i>
      <span class="tab" id="ls-panel">System Boot</span>
      <div class="loader-body">
        <div class="row">
          <span class="status" id="status" aria-live="polite">Connexion au serveur…</span>
          <span class="pct" id="pct" aria-hidden="true">0%</span>
        </div>
        <div class="bar" aria-hidden="true"><div class="fill" id="fill"></div></div>
      </div>
    </section>
  </main>

  <footer class="foot" style="--i:2">
    <div class="tip">
      <span class="tip-tag" id="ls-tiptag">Astuce</span>
      <span class="tip-text" id="tip"></span>
    </div>
    <div class="sig" id="ls-sig">projet r · laforetbrut</div>
  </footer>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
