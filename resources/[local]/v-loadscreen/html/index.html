<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <video class="bg-video" autoplay muted loop playsinline poster="poster.jpg">
    <source src="bg.webm" type="video/webm" />
  </video>
  <div class="bg-overlay"></div>
  <div class="vignette"></div>
  <div class="scan"></div>

  <main class="stage">
    <header class="brand">
      <div class="kicker">LOS SANTOS ROLEPLAY</div>
      <h1 class="mark">PROJET <span>R</span></h1>
    </header>

    <section class="loader">
      <div class="row">
        <span class="status" id="status">Connexion au serveur…</span>
        <span class="pct" id="pct">0%</span>
      </div>
      <div class="bar"><div class="fill" id="fill"></div></div>
    </section>
  </main>

  <footer class="foot">
    <div class="tip">
      <span class="tip-tag">ASTUCE</span>
      <span class="tip-text" id="tip"></span>
    </div>
    <div class="sig">projet&nbsp;r · laforetbrut</div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
