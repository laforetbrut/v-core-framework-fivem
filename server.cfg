## ── Network endpoints ─────────────────────────────────────────
endpoint_add_tcp "0.0.0.0:30120"
endpoint_add_udp "0.0.0.0:30120"

sv_maxclients 48
set steam_webApiKey "none"
sets tags "default, vanilla, dev"

## ── Server identity & license ─────────────────────────────────
## License key is loaded from license.cfg (gitignored — never committed).
## Get a free key at https://keymaster.fivem.net/. Server WILL NOT START without it.
exec license.cfg

sv_hostname "Projet R"
sets sv_projectName "Projet R"
sets sv_projectDesc "Projet R — FiveM development server"
sets locale "fr-FR"
# load_server_icon myLogo.png            # optional 96x96 PNG server icon

## Game build — modern DLC build (works on GTA V Enhanced + Legacy clients).
## 3570 = Money Fronts (mp2025_01). Requires recent server artifacts (32561 installed).
## Enhanced is the CLIENT edition; a recent artifact + this build accepts Enhanced clients.
sv_enforceGameBuild 3570

## Use the chat resource bundled with the server artifacts.
set resources_useSystemChat true

## Default language for i18n (fr / en) — per-player choice overrides this.
set vcore_lang "fr"

## ── OneSync (required for >32 slots and modern natives) ───────
set onesync on

## ── Database (oxmysql -> local MariaDB, database projet_r) ────
## Start the DB first with start-db.bat. Credentials live in the string below.
set mysql_connection_string "mysql://root:root@localhost:3306/projet_r?charset=utf8mb4"
ensure oxmysql

## ── Standalone tools ──────────────────────────────────────────
## screenshot-basic: in-game screen capture (Cfx.re official). Builds itself
## at boot via the bundled yarn/webpack. Used by v-clothing to auto-generate
## the clothing catalogue thumbnails. Admin command: /scanclothes
ensure screenshot-basic

## ── Default cfx resources (the vanilla base) ─────────────────
ensure mapmanager
ensure spawnmanager
ensure sessionmanager
ensure basic-gamemode
ensure hardcap
ensure baseevents
ensure rconlog
ensure playernames

## ── Our own resources — everything we build lives in [local] ──
ensure v-loadscreen  # custom loading screen (shown while players connect)
ensure v-ui       # shared design system (loaded before UIs)
ensure v-notify   # themed toast notifications (used by Core.Notify)
ensure v-core       # framework core (DB, API, player, permissions, logs, i18n)
ensure v-jobs       # jobs, grades, duty & salaries (source of truth for job gates)
ensure v-appearance # appearance engine: single ped writer, stable clothing identity
ensure v-spawn      # language select + character creation + appearance editor
ensure v-status   # hunger / thirst / stress / injuries / illness
ensure v-hud      # customizable HUD (money + vitals)
ensure v-banking    # Fleeca banking (ATM + account UI)
ensure v-target     # universal interaction eye (permission/job-aware options)
ensure v-inventory  # grid inventory (weight, use/drop/give, trunk & stashes)
ensure v-shops      # stores: buy items (prices from the shops table)
ensure v-crafting   # workbench crafting: recipes consume items to produce new ones
ensure v-gathering  # resource nodes (mining/salvage/textile) -> raw crafting materials
ensure v-clothing   # clothing store (live preview) + clothing-as-items + equip/unequip
ensure v-admin      # in-game admin panel (F10): players, scripts, world, logs
# ── future modules: ensure v-jobs / v-phone / v-radial / v-drugs / ... ──

## ── Permissions ──────────────────────────────────────────────
add_ace group.admin command allow

# Become admin: uncomment and paste one of your identifiers (see server console on connect).
# add_principal identifier.fivem:0000000 group.admin
# add_principal identifier.license:0000000000000000000000000000000000000000 group.admin
