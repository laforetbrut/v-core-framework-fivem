# QBCore development server
# Author: vyrriox
# Docs: https://docs.qbcore.org  |  https://aka.cfx.re/server-commands

## ─────────────────────────────────────────────────────────────
## Network endpoints
## ─────────────────────────────────────────────────────────────
endpoint_add_tcp "0.0.0.0:30120"
endpoint_add_udp "0.0.0.0:30120"

sv_maxclients 48
set steam_webApiKey "none"
sets tags "default, qbcore, qb-core, dev"

## ─────────────────────────────────────────────────────────────
## Server identity & license
## ─────────────────────────────────────────────────────────────
## REQUIRED: get a free key at https://keymaster.fivem.net/ and paste it below.
## The server WILL NOT START until a valid key is set here.
sv_licenseKey "changeme"

sv_hostname "QBCore Dev Server"
sets sv_projectName "QBCore Dev"
sets sv_projectDesc "Local development server for FiveM script development"
sets locale "fr-FR"
load_server_icon myLogo.png

# Game build (3095 = The Chop Shop DLC — required by current QBCore)
sv_enforceGameBuild 3095

# Use the system chat resource bundled with the server artifacts
set resources_useSystemChat true

## ─────────────────────────────────────────────────────────────
## Database (oxmysql -> MariaDB local)
## ─────────────────────────────────────────────────────────────
set mysql_connection_string "mysql://root:root@localhost:3306/qbcore?charset=utf8mb4"

## ─────────────────────────────────────────────────────────────
## Voice (pma-voice)
## ─────────────────────────────────────────────────────────────
setr voice_useNativeAudio true
setr voice_defaultCycle "GRAVE"
setr voice_defaultVolume 0.3
setr voice_enableRadioAnim 1
setr voice_syncData 1
setr voice_useSendingRangeOnly false

## ─────────────────────────────────────────────────────────────
## QBCore config
## ─────────────────────────────────────────────────────────────
setr qb_locale "en"
setr UseTarget false

## ─────────────────────────────────────────────────────────────
## Default system resources (shipped with the artifacts / cfx-default)
## ─────────────────────────────────────────────────────────────
ensure mapmanager
ensure chat
ensure spawnmanager
ensure sessionmanager
ensure basic-gamemode
ensure hardcap
ensure baseevents

## ─────────────────────────────────────────────────────────────
## QBCore & extra resources (folder ensures start every resource inside)
## ─────────────────────────────────────────────────────────────
ensure qb-core
ensure [qb]
ensure [standalone]
ensure [voice]
ensure [defaultmaps]

## ─────────────────────────────────────────────────────────────
## Your own development scripts live here — started last
## ─────────────────────────────────────────────────────────────
ensure [local]

## ─────────────────────────────────────────────────────────────
## Permissions
## ─────────────────────────────────────────────────────────────
add_ace group.admin command allow            # allow all commands for admins

# Add your own identifier below to become server admin (uncomment & edit):
# add_principal identifier.fivem:0000000 group.admin
# add_principal identifier.license:0000000000000000000000000000000000000000 group.admin

add_ace resource.qb-core command allow       # allow qb-core to execute commands
add_ace qbcore.god command allow             # allow all commands for gods
add_principal qbcore.god group.admin
add_principal qbcore.god qbcore.admin
add_principal qbcore.admin qbcore.mod
